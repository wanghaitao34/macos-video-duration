# XcodeGen 配置文件
# 安装: brew install xcodegen
# 使用: cd VideoDurationApp && xcodegen generate

name: VideoDuration
options:
  bundleIdPrefix: com.hector
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    PRODUCT_NAME: 视频总时长
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  VideoDuration:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "*.entitlements"
    info:
      path: Sources/Info.plist
    entitlements:
      path: Sources/VideoDuration.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hector.VideoDuration
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""   # ← 填入你的 Team ID
    dependencies:
      - framework: AVFoundation.framework
        embed: false
