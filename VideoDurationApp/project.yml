# XcodeGen 配置
# 使用: xcodegen generate

name: Viduration
options:
  bundleIdPrefix: com.hector
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "1620"

settings:
  base:
    PRODUCT_NAME: Viduration
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 4C563CA5JD
    CODE_SIGN_IDENTITY: "Apple Development"
    DEAD_CODE_STRIPPING: YES
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Viduration:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "*.entitlements"
          - "Info.plist"
          - "AppIcon.icns"
          - "icon.icon"
      - path: Sources/icon.icon
        type: folder
    info:
      path: Sources/Info.plist
    entitlements:
      path: Sources/Viduration.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hector.Viduration
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ICON_FILE: icon
