# XcodeGen 配置
# 使用: xcodegen generate

name: VideoDuration
options:
  bundleIdPrefix: com.hector
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "1620"

settings:
  base:
    PRODUCT_NAME: 视频总时长
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7CSHUN4VKA
    CODE_SIGN_IDENTITY: "Apple Development"
    DEAD_CODE_STRIPPING: YES
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  VideoDuration:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "*.entitlements"
          - "Info.plist"
          - "AppIcon.icns"
    info:
      path: Sources/Info.plist
    entitlements:
      path: Sources/VideoDuration.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hector.VideoDuration
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
